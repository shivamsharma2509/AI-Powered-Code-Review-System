# Actuator configuration
management.endpoints.web.exposure.include=health,info

# Resilience4j configuration (disabled or relaxed for dev)
resilience4j.circuitbreaker.instances.huggingFaceClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.huggingFaceClient.slidingWindowSize=5

# Logging configuration
logging.level.com.ai.codereview=DEBUG

jwt.secret=mySuperSecretKeyThatIsAtLeast32CharactersLong123
jwt.expiration=3600000
