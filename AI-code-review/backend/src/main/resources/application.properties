# ----------------------------------------
# ACTIVE PROFILE
# ----------------------------------------
spring.profiles.active=dev


# ----------------------------------------
# APPLICATION INFO (optional but good)
# ----------------------------------------
spring.application.name=ai-code-review


# ----------------------------------------
# SERVER CONFIG (optional)
# ----------------------------------------
server.port=8080


# ----------------------------------------
# LOGGING (base level, can override in profiles)
# ----------------------------------------
logging.level.root=INFO


# ----------------------------------------
# JACKSON (optional - clean JSON responses)
# ----------------------------------------
spring.jackson.serialization.indent_output=true


# ----------------------------------------
# ACTUATOR BASE CONFIG (can override in profiles)
# ----------------------------------------
management.endpoints.web.exposure.include=health,info
huggingface.api.key=
huggingface.api.url=