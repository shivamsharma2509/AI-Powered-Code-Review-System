# H2 Database configuration for production (using file-based for persistence if needed, or keeping it as placeholder)
spring.datasource.url=jdbc:h2:file:./data/reviewdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate

# Connection Pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Resilience4j configuration
resilience4j.circuitbreaker.instances.huggingFaceClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.huggingFaceClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.huggingFaceClient.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.huggingFaceClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.huggingFaceClient.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.huggingFaceClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.huggingFaceClient.eventConsumerBufferSize=10

resilience4j.retry.instances.huggingFaceClient.maxAttempts=3
resilience4j.retry.instances.huggingFaceClient.waitDuration=2s
resilience4j.retry.instances.huggingFaceClient.retryExceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException

# Logging configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5p %c{1}:%L - %m%n
logging.level.com.ai.codereview=DEBUG

# Security configuration (placeholder for development)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
